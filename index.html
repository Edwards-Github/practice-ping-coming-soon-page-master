<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./images/favicon-32x32.png"
    />
    <link rel="stylesheet" href="style.css" />
    <script src="script.js" defer></script>
    <title>Frontend Mentor | Ping coming soon page</title>
  </head>
  <body>
    <header>
      <img src="assets/images/logo.svg" alt="Ping" />
    </header>

    <main>
      <h1>We are launching <strong>soon!</strong></h1>
      <p>Subscribe and get notified</p>
      <form>
        <div class="input-group">
          <input
            type="email"
            class="email"
            placeholder="Your email address..."
            required
          />
          <p class="error-message">Please provide a valid email address</p>
        </div>
        <button>Notify Me</button>
      </form>
      <img
        src="assets/images/illustration-dashboard.png"
        alt=". . ."
        class="dashboard-image"
      />
    </main>

    <footer class="attribution">
      <div class="social-icons">
        <div class="icon-circle"><span class="icon icon-facebook"></span></div>
        <div class="icon-circle"><span class="icon icon-twitter"></span></div>
        <div class="icon-circle"><span class="icon icon-instagram"></span></div>
      </div>
      <p>&copy; Copyright Ping. All rights reserved.</p>
      <p>
        Challenge by
        <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a
        >. Coded by <a href="#">Edward</a>.
      </p>
    </footer>
  </body>
</html>
